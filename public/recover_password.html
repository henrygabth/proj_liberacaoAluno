<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Registro - Controle de gastos</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    
    <link rel='stylesheet' type='text/css' media='screen' href='./css/style.css'>
</head>

<body class="centralize">
    <form>
        <div class="form-field">
            <div><label>Email</label></div>
            <input type="email" placeholder="seu@email.com" id="email" onchange="onChangeEmail()"/>
            <div class="error" id="email-required-error">Email é obrigatório</div>
            <div class="error" id="email-invalid-error">Email é invalido</div>
        </div>
        <div>
            <button type="button" class="enter-btn" disabled="true" onclick="register()" id="register-button">Enviar solicitação</button>
        </div>
        <div>
            <button type="button" class="clear">Voltar ao login</button>
        </div>
    </form>
</body>

</html>
